set_volume:
  name: Gradually set Volume
  description: Changes the volume gradually on media_player (0-1) or number (raw value, e.g. dB) entities
  target:
    entity:
      domain:
        - media_player
        - number
  fields:
    volume:
      name: Volume
      description: Target volume. Use 0-1 for media_player, raw value (e.g. dB) for number entities
      required: true
      example: 0.5
      selector:
        number:
          min: -120
          max: 20
          step: 0.01
          mode: box
    duration:
      name: Duration
      description: Duration in seconds
      required: false
      example: 10
      default: 5
      selector:
        number:
          min: 0.1
          max: 120
          step: 0.1
          mode: slider
cancel_all:
  name: Cancel all
  description: Cancels all gradual volume changes of given entity
  target:
    entity:
      domain:
        - media_player
        - number
